# Slack app manifest for the merge-queue bot.
#
# Create the app:
#   1. https://api.slack.com/apps → Create New App → From an app manifest
#   2. Pick your workspace → paste this file (or upload it)
#   3. Basic Information → App-Level Tokens → Generate Token
#      Scope: connections:write  (required for Socket Mode)
#   4. Install App → copy Bot User OAuth Token (xoxb-...)
#   5. Copy .env.example → .env, fill in tokens, run ./start.sh
#
# Invite the bot to your channel: /invite @merge-bot

display_information:
  name: Merge Queue Bot
  description: FIFO merge queue for GetStream/chat — queue PRs, sync with base, wait for CI, squash merge.
  long_description: |
    Merge Queue Bot queues pull requests for [GetStream/chat](https://github.com/GetStream/chat).

    Queue a PR from Slack and the worker handles the rest: sync with base, wait for CI on the latest commit, squash merge when green.

    How it works
    - One PR processed at a time — no merge-from-master stampede
    - Syncs with base via gh pr update-branch when the branch is behind
    - Waits for the Ready to merge check on the current HEAD (ignores stale greens)
    - Skips PRs that cannot merge: conflicts, missing approval, branch policy
    - Retries flaky CI (up to 3 attempts) and posts failure details in thread

    Commands
    - /merge or /merge-queue — add a PR by number or URL
    - /merge-status — current queue and what's processing
    - /merge-history — recent merged, skipped, and failed PRs
    - /merge-deploy — pull latest code and restart bot + worker (admins only)

    Links
    - Bot source: [github.com/itsmeadi/merge-queue](https://github.com/itsmeadi/merge-queue)
    - Target repo: [GetStream/chat](https://github.com/GetStream/chat)
  background_color: "#0052cc"

features:
  bot_user:
    display_name: merge-bot
    always_online: true
  slash_commands:
    - command: /merge
      description: Add a PR to the merge queue
      usage_hint: "12345 or https://github.com/GetStream/chat/pull/12345"
      should_escape: false
    - command: /merge-queue
      description: Add a PR to the merge queue (alias)
      usage_hint: "12345 or https://github.com/GetStream/chat/pull/12345"
      should_escape: false
    - command: /merge-status
      description: Show the current merge queue
      should_escape: false
    - command: /merge-history
      description: Show recent merge queue outcomes
      usage_hint: "5 (optional count, max 50)"
      should_escape: false
    - command: /merge-deploy
      description: Pull latest code and restart bot + worker
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public
      - channels:history
      - groups:history
      - im:history

settings:
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
  interactivity:
    is_enabled: false
