# Slack app manifest for the merge-queue bot.
#
# Create the app:
#   1. https://api.slack.com/apps → Create New App → From an app manifest
#   2. Pick your workspace → paste this file (or upload it)
#   3. Basic Information → App-Level Tokens → Generate Token
#      Scope: connections:write  (required for Socket Mode)
#   4. Install App → copy Bot User OAuth Token (xoxb-...)
#   5. Copy .env.example → .env, fill in tokens, run ./start.sh
#
# Invite the bot to your channel: /invite @merge-bot
#
# About tab formatting — apply via Features → App Manifest only (not Basic Information).
# Links: <https://example.com|Label>   Code: `like this`

display_information:
  name: Merge Queue Bot
  description: FIFO merge queue for GetStream/chat PRs. Commands - merge, merge-status, merge-history, merge-deploy.
  long_description: |
    Queue <https://github.com/GetStream/chat|GetStream/chat> pull requests from Slack. Syncs each branch with the base branch, waits for CI on the latest commit, and squash merges when green.

    Skips PRs that cannot merge and retries flaky CI failures.

    Commands: `/merge`, `/merge-queue`, `/merge-status`, `/merge-history`, `/merge-deploy` (admin only).

    React with `:merge_bot:` on a GitHub PR message to queue it. When merged, the bot adds `:merged:` to that message.

    Example: `/merge 14699` or `/merge https://github.com/GetStream/chat/pull/14699`

    Source: <https://github.com/itsmeadi/merge-queue|github.com/itsmeadi/merge-queue>
  background_color: "#0052cc"

features:
  bot_user:
    display_name: merge-bot
    always_online: true
  slash_commands:
    - command: /merge
      description: Add a PR to the merge queue
      usage_hint: "14699 or https://github.com/GetStream/chat/pull/14699"
      should_escape: false
    - command: /merge-queue
      description: Add a PR to the merge queue (alias)
      usage_hint: "14699 or https://github.com/GetStream/chat/pull/14699"
      should_escape: false
    - command: /merge-status
      description: Show the current merge queue
      should_escape: false
    - command: /merge-history
      description: Show recent merge queue outcomes
      usage_hint: "5 (optional count, max 50)"
      should_escape: false
    - command: /merge-deploy
      description: Pull latest code and restart bot + worker
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - reactions:read
      - reactions:write

settings:
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
  event_subscriptions:
    bot_events:
      - reaction_added
  interactivity:
    is_enabled: false
